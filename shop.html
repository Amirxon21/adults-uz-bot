<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>adults.uz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14161f;
    --surface:#1c1f2a;
    --surface-2:#252938;
    --line:#323649;
    --paper:#f3f1ea;
    --muted:#9a9fb3;
    --teal:#22c3ab;
    --teal-dim:#1a6f63;
    --mustard:#e8a33d;
    --danger:#e2574c;
    --radius:18px;
    font-size:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
  html,body{
    margin:0; padding:0; background:var(--ink); color:var(--paper);
    font-family:'Inter',system-ui,sans-serif;
    height:100%;
    overscroll-behavior-y:none;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  #app{
    max-width:480px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column; position:relative;
    padding-bottom:78px;
  }

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--ink) 70%, transparent);
    padding:18px 18px 10px;
  }
  .brand-row{display:flex; align-items:center; justify-content:space-between;}
  .brand{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.5rem;
    letter-spacing:-0.02em; display:flex; align-items:center; gap:8px;
  }
  .brand .dot{width:8px; height:8px; border-radius:50%; background:var(--teal); box-shadow:0 0 12px var(--teal);}
  .cart-btn{
    position:relative; width:42px; height:42px; border-radius:12px;
    background:var(--surface); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:transform .15s ease;
  }
  .cart-btn:active{transform:scale(.92);}
  .cart-count{
    position:absolute; top:-6px; right:-6px; background:var(--mustard); color:#1a1206;
    font-size:.65rem; font-weight:700; min-width:18px; height:18px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 4px;
    font-family:'JetBrains Mono',monospace;
  }
  .search{
    margin-top:14px; display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:10px 14px; color:var(--muted); font-size:.9rem;
  }
  .search input{
    background:none; border:none; outline:none; color:var(--paper); font-family:'Inter'; font-size:.9rem; width:100%;
  }
  .search input::placeholder{color:var(--muted);}

  /* category chips */
  .chips{display:flex; gap:8px; overflow-x:auto; padding:14px 18px 4px; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:none; padding:8px 16px; border-radius:100px; font-size:.82rem; font-weight:600;
    background:var(--surface); border:1px solid var(--line); color:var(--muted); cursor:pointer;
    transition:.15s ease;
  }
  .chip.active{background:var(--teal); border-color:var(--teal); color:#092420;}

  /* ---------- Views ---------- */
  .view{display:none; padding:6px 18px 24px; animation:fadeIn .25s ease;}
  .view.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .section-title{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.05rem; margin:18px 2px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-title span.count{color:var(--muted); font-size:.8rem; font-weight:500; font-family:'JetBrains Mono';}

  /* product grid */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; cursor:pointer; position:relative;
    transition:transform .18s ease, border-color .18s ease;
  }
  .card:active{transform:scale(.97);}
  .card-img{
    aspect-ratio:1/1; width:100%; display:flex; align-items:center; justify-content:center; font-size:2.4rem;
    position:relative; overflow:hidden;
  }
  .card-tag{
    position:absolute; top:8px; left:8px; background:var(--ink); color:var(--mustard);
    font-family:'JetBrains Mono'; font-size:.62rem; font-weight:600; padding:3px 8px;
    border-radius:6px; border:1px solid var(--mustard);
  }
  .card-body{padding:10px 12px 12px;}
  .card-name{font-size:.86rem; font-weight:600; line-height:1.25; margin-bottom:6px; min-height:2.2em;}
  .card-meta{display:flex; align-items:center; justify-content:space-between;}
  .card-price{font-family:'JetBrains Mono'; font-weight:600; color:var(--teal); font-size:.88rem;}
  .card-add{
    width:30px; height:30px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line);
    color:var(--paper); display:flex; align-items:center; justify-content:center; font-size:1.1rem;
    transition:.15s ease;
  }
  .card-add:active{transform:scale(.85); background:var(--teal); color:#092420;}
  .stock-low{color:var(--danger); font-size:.68rem; font-family:'JetBrains Mono'; margin-top:4px;}

  /* ---------- Product detail sheet ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(10,11,16,.6); backdrop-filter:blur(2px);
    opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:40;
  }
  .sheet-backdrop.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto;
    background:var(--surface); border-radius:24px 24px 0 0; border:1px solid var(--line); border-bottom:none;
    transform:translateY(100%); transition:transform .32s cubic-bezier(.22,1,.36,1); z-index:41;
    max-height:88vh; overflow-y:auto; padding-bottom:24px;
  }
  .sheet.show{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--line); border-radius:2px; margin:10px auto;}
  .sheet-img{aspect-ratio:1/1; width:calc(100% - 36px); margin:0 18px 6px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:4rem;}
  .sheet-content{padding:6px 20px 0;}
  .sheet-title{font-family:'Space Grotesk'; font-weight:700; font-size:1.3rem; margin-bottom:4px;}
  .sheet-price{font-family:'JetBrains Mono'; color:var(--teal); font-size:1.2rem; font-weight:600; margin-bottom:14px;}
  .sheet-desc{color:var(--muted); font-size:.88rem; line-height:1.5; margin-bottom:16px;}
  .option-row{margin-bottom:16px;}
  .option-label{font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; font-weight:600;}
  .option-pills{display:flex; gap:8px; flex-wrap:wrap;}
  .pill{
    padding:8px 14px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2);
    font-size:.85rem; font-weight:600; cursor:pointer; transition:.15s ease;
  }
  .pill.selected{border-color:var(--teal); background:rgba(34,195,171,.15); color:var(--teal);}
  .qty-row{display:flex; align-items:center; gap:14px; margin-bottom:20px;}
  .qty-btn{
    width:36px; height:36px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line);
    font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .qty-val{font-family:'JetBrains Mono'; font-weight:600; min-width:24px; text-align:center;}
  .btn-primary{
    width:100%; padding:15px; border-radius:14px; background:var(--teal); color:#092420;
    font-weight:700; font-size:.95rem; border:none; cursor:pointer; font-family:'Inter';
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .12s ease;
  }
  .btn-primary:active{transform:scale(.97);}
  .btn-primary:disabled{opacity:.4;}

  /* ---------- Cart view ---------- */
  .cart-item{
    display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line);
  }
  .cart-thumb{
    width:64px; height:64px; border-radius:12px; background:var(--surface-2); flex:none;
    display:flex; align-items:center; justify-content:center; font-size:1.6rem;
  }
  .cart-info{flex:1; min-width:0;}
  .cart-name{font-weight:600; font-size:.9rem; margin-bottom:2px;}
  .cart-opts{color:var(--muted); font-size:.75rem; font-family:'JetBrains Mono'; margin-bottom:8px;}
  .cart-row-bottom{display:flex; align-items:center; justify-content:space-between;}
  .cart-qty{display:flex; align-items:center; gap:10px;}
  .cart-qty button{
    width:26px; height:26px; border-radius:8px; background:var(--surface-2); border:1px solid var(--line);
    color:var(--paper); font-size:1rem; cursor:pointer;
  }
  .cart-price{font-family:'JetBrains Mono'; font-weight:600; font-size:.88rem;}
  .remove-btn{color:var(--danger); font-size:.72rem; font-family:'JetBrains Mono'; cursor:pointer; margin-top:6px;}
  .empty-state{text-align:center; padding:60px 20px; color:var(--muted);}
  .empty-state .icon{font-size:2.6rem; margin-bottom:12px;}
  .summary-box{
    background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:16px; margin-top:18px;
  }
  .summary-line{display:flex; justify-content:space-between; font-size:.85rem; color:var(--muted); margin-bottom:8px;}
  .summary-total{display:flex; justify-content:space-between; font-weight:700; font-size:1.05rem; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .summary-total .val{font-family:'JetBrains Mono'; color:var(--teal);}

  /* ---------- Orders view ---------- */
  .order-card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:12px;
  }
  .order-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .order-id{font-family:'JetBrains Mono'; font-weight:600; font-size:.85rem;}
  .order-status{
    font-size:.68rem; font-weight:700; padding:4px 10px; border-radius:100px; font-family:'JetBrains Mono';
  }
  .status-pending{background:rgba(232,163,61,.15); color:var(--mustard);}
  .status-paid, .status-shipped{background:rgba(34,195,171,.15); color:var(--teal);}
  .status-delivered{background:rgba(90,200,120,.15); color:#5ac878;}
  .order-desc{color:var(--muted); font-size:.8rem; margin-bottom:6px;}
  .order-bottom{display:flex; justify-content:space-between; align-items:center; font-size:.82rem;}

  /* ---------- Bottom nav ---------- */
  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    background:rgba(28,31,42,.9); backdrop-filter:blur(14px); border-top:1px solid var(--line);
    display:flex; padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:30;
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--muted); display:flex; flex-direction:column;
    align-items:center; gap:3px; font-size:.65rem; font-family:'Inter'; font-weight:600; cursor:pointer;
    padding:4px 0;
  }
  nav.bottom button .ic{font-size:1.25rem;}
  nav.bottom button.active{color:var(--teal);}

  /* ---------- Checkout / stitch confirmation ---------- */
  .confirm-overlay{
    position:fixed; inset:0; background:var(--ink); z-index:60; display:flex; flex-direction:column;
    align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .confirm-overlay.show{opacity:1; pointer-events:auto;}
  .stitch-wrap{width:220px; height:120px; position:relative; margin-bottom:22px;}
  .stitch-svg{width:100%; height:100%;}
  .stitch-path{
    stroke:var(--teal); stroke-width:3; fill:none; stroke-dasharray:6 8; stroke-linecap:round;
    stroke-dashoffset:400; 
  }
  .confirm-overlay.show .stitch-path{animation:sew 1.1s ease forwards;}
  @keyframes sew{ to{stroke-dashoffset:0;} }
  .check-mark{
    stroke:var(--teal); stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:60; stroke-dashoffset:60; opacity:0;
  }
  .confirm-overlay.show .check-mark{animation:checkIn .4s ease .95s forwards;}
  @keyframes checkIn{ 0%{opacity:0;} 1%{opacity:1;} 100%{stroke-dashoffset:0; opacity:1;} }
  .confirm-title{
    font-family:'Space Grotesk'; font-weight:700; font-size:1.3rem; text-align:center; margin-bottom:6px;
    opacity:0; transform:translateY(8px);
  }
  .confirm-overlay.show .confirm-title{animation:riseIn .5s ease 1.15s forwards;}
  .confirm-sub{color:var(--muted); font-size:.85rem; text-align:center; max-width:280px; opacity:0; transform:translateY(8px);}
  .confirm-overlay.show .confirm-sub{animation:riseIn .5s ease 1.3s forwards;}
  @keyframes riseIn{ to{opacity:1; transform:translateY(0);} }
  .confirm-btn{
    margin-top:26px; opacity:0;
  }
  .confirm-overlay.show .confirm-btn{animation:riseIn .5s ease 1.45s forwards;}

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--line); color:var(--paper); padding:10px 18px;
    border-radius:100px; font-size:.82rem; font-weight:600; z-index:70; opacity:0; transition:.25s ease;
    display:flex; align-items:center; gap:8px; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand-row">
      <div class="brand"><span class="dot"></span>adults<span style="color:var(--muted)">.uz</span></div>
      <div class="cart-btn" onclick="showView('cart')">
        🛍️
        <div class="cart-count" id="cartCount">0</div>
      </div>
    </div>
    <div class="search">
      🔍 <input id="searchInput" placeholder="Mahsulot qidirish..." oninput="renderCatalog()">
      <div id="imageSearchBtn" style="cursor:pointer; font-size:1.1rem;" onclick="document.getElementById('imageFileInput').click()">📷</div>
      <input type="file" id="imageFileInput" accept="image/*" style="display:none;" onchange="handleImageSearch(event)">
    </div>
    <div class="chips" id="chips"></div>
  </header>

  <!-- ===== CATALOG VIEW ===== -->
  <div class="view active" id="view-catalog">
    <div id="aiSearchBanner"></div>
    <div class="section-title">Katalog <span class="count" id="catalogCount"></span></div>
    <div class="grid" id="productGrid"></div>
  </div>

  <!-- ===== AI YORDAMCHI VIEW ===== -->
  <div class="view" id="view-ai">
    <div class="section-title">🤖 AI Yordamchi</div>
    <div id="chatMessages" style="display:flex; flex-direction:column; gap:10px; margin-bottom:14px; min-height:200px;"></div>
    <div style="display:flex; gap:8px; position:sticky; bottom:78px;">
      <input id="chatInput" placeholder="Masalan: yozgi futbolka kerak..." style="flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 14px; color:var(--paper); font-family:'Inter'; outline:none;" onkeydown="if(event.key==='Enter') sendChatMessage()">
      <button onclick="sendChatMessage()" style="background:var(--teal); border:none; border-radius:12px; padding:0 18px; color:#092420; font-weight:700; cursor:pointer;">➤</button>
    </div>
  </div>

  <!-- ===== CART VIEW ===== -->
  <div class="view" id="view-cart">
    <div class="section-title">Savat</div>
    <div id="cartList"></div>
    <div id="cartSummary"></div>
  </div>

  <!-- ===== ORDERS VIEW ===== -->
  <div class="view" id="view-orders">
    <div class="section-title">Buyurtmalarim</div>
    <div id="ordersList"></div>
  </div>

  <!-- ===== PROFILE VIEW ===== -->
  <div class="view" id="view-profile">
    <div class="section-title">Profil</div>
    <div style="background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px; text-align:center;">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 12px;">🙂</div>
      <div style="font-weight:700; font-family:'Space Grotesk';" id="profileName">Mehmon</div>
      <div style="color:var(--muted); font-size:.8rem; margin-top:4px;" id="profileId">Telegram ID: —</div>
    </div>
    <div class="section-title" style="margin-top:22px;">Sozlamalar</div>
    <div style="background:var(--surface); border:1px solid var(--line); border-radius:16px; overflow:hidden;">
      <div style="padding:14px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between;">📦 Yetkazib berish manzili <span style="color:var(--muted)">›</span></div>
      <div style="padding:14px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between;">📞 Aloqa raqami <span style="color:var(--muted)">›</span></div>
      <div style="padding:14px 16px; display:flex; justify-content:space-between;">💬 Qo'llab-quvvatlash <span style="color:var(--muted)">›</span></div>
    </div>
  </div>

  <nav class="bottom">
    <button class="active" onclick="showView('catalog')"><span class="ic">🗂️</span>Katalog</button>
    <button onclick="showView('ai')"><span class="ic">🤖</span>AI</button>
    <button onclick="showView('cart')"><span class="ic">🛍️</span>Savat</button>
    <button onclick="showView('orders')"><span class="ic">📋</span>Buyurtmalar</button>
    <button onclick="showView('profile')"><span class="ic">👤</span>Profil</button>
  </nav>
</div>

<!-- Product detail sheet -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-img" id="sheetImg"></div>
  <div id="sheetGalleryStrip" style="display:flex; gap:8px; padding:10px 18px 0; overflow-x:auto;"></div>
  <div class="sheet-content">
    <div class="sheet-title" id="sheetTitle"></div>
    <div class="sheet-price mono" id="sheetPrice"></div>
    <div class="sheet-desc" id="sheetDesc"></div>
    <div class="option-row">
      <div class="option-label">Xususiyatlari</div>
      <div class="option-pills" id="variantTags"></div>
    </div>
    <div class="qty-row">
      <div class="option-label" style="margin:0;">Miqdor</div>
      <div class="qty-btn" onclick="changeQty(-1)">−</div>
      <div class="qty-val mono" id="qtyVal">1</div>
      <div class="qty-btn" onclick="changeQty(1)">+</div>
    </div>
    <button class="btn-primary" id="addToCartBtn" onclick="addToCart()">Savatga qo'shish</button>
  </div>
</div>

<!-- Order confirmation overlay -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="stitch-wrap">
    <svg class="stitch-svg" viewBox="0 0 220 120">
      <path class="stitch-path" d="M10,90 C 40,20 80,20 110,60 S 180,100 210,40" pathLength="400"/>
      <path class="check-mark" d="M78,62 L96,80 L142,34" pathLength="60" transform="translate(0,0)"/>
    </svg>
  </div>
  <div class="confirm-title">Rahmat! Buyurtmangiz qabul qilindi 🎉</div>
  <div class="confirm-sub" id="confirmOrderInfo">Buyurtma raqami tez orada sizga yuboriladi.</div>
  <button class="btn-primary confirm-btn" style="width:200px;" onclick="closeConfirm()">Davom etish</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   API BILAN ISHLASH
   Bu ilova endi FastAPI backend (api.py)dan real ma'lumot oladi.
   Agar shop.html'ni backend serverga bog'lamasdan alohida ochsangiz,
   API_BASE'ni to'liq manzilga o'zgartiring, masalan:
   const API_BASE = "http://127.0.0.1:8000";
   ========================================================= */
const API_BASE = ""; // bo'sh — chunki api.py shop.html'ni o'zi /shop orqali beradi

// Har bir mahsulot rasmi o'rniga chiqadigan emoji (kategoriya nomi bo'yicha, faqat vizual uchun)
const CATEGORY_EMOJI = {
  "Futbolka":"👕", "Ko'ylak":"👔", "Shim":"👖", "Kurtka":"🧥", "Aksessuar":"👞"
};
function emojiFor(p){ return CATEGORY_EMOJI[p.category_name] || "🛍️"; }

let CATEGORIES = ["Hammasi"];
let PRODUCTS = [];
let cart = [];          // {productId, size, color, qty}
let orders = [];
let activeCategory = "Hammasi";
let currentProduct = null;
let qty = 1;

/* ---------- Telegram Web App init ---------- */
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }
const tgUser = tg?.initDataUnsafe?.user;
document.getElementById('profileName').textContent = tgUser?.first_name || "Mehmon";
document.getElementById('profileId').textContent = "Telegram ID: " + (tgUser?.id || "—");

// Telegram tashqarisida (oddiy brauzerda) sinab ko'rish uchun zaxira ID
const myTelegramId = tgUser?.id || 999000111;
const myFullName = tgUser ? `${tgUser.first_name || ''} ${tgUser.last_name || ''}`.trim() : "Test foydalanuvchi";
const myUsername = tgUser?.username || null;
const myPhotoUrl = tgUser?.photo_url || null;

let categoryMap = {};   // id -> name
let categoryNameToId = {}; // name -> id

/* ---------- API chaqiruvlari ---------- */
async function apiGet(path){
  const res = await fetch(API_BASE + path);
  if(!res.ok) throw new Error("API xatosi: " + path);
  return res.json();
}
async function apiPost(path, body){
  const res = await fetch(API_BASE + path, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body),
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({detail:"Noma'lum xatolik"}));
    throw new Error(err.detail || "API xatosi");
  }
  return res.json();
}

async function loadCategories(){
  try{
    const cats = await apiGet('/api/categories');
    categoryMap = {}; categoryNameToId = {};
    cats.forEach(c => { categoryMap[c.id] = c.name; categoryNameToId[c.name] = c.id; });
    CATEGORIES = ["Hammasi", ...cats.map(c=>c.name)];
  } catch(e){
    console.error(e);
    CATEGORIES = ["Hammasi"];
  }
  renderChips();
}

async function loadProducts(){
  try{
    const categoryId = activeCategory === "Hammasi" ? null : categoryNameToId[activeCategory];
    const params = new URLSearchParams({limit:"100"});
    if(categoryId) params.set("category_id", categoryId);
    const list = await apiGet('/api/products?' + params.toString());
    PRODUCTS = list.map(p => ({...p, category_name: categoryMap[p.category_id] || "", emoji: emojiFor({category_name: categoryMap[p.category_id]})}));
  } catch(e){
    console.error(e);
    showToast("⚠️ Serverga ulanib bo'lmadi");
    PRODUCTS = [];
  }
  renderCatalog();
}

/* ---------- Chips ---------- */
function renderChips(){
  const wrap = document.getElementById('chips');
  wrap.innerHTML = CATEGORIES.map(c =>
    `<div class="chip ${c===activeCategory?'active':''}" onclick="selectCategory('${c}')">${c}</div>`
  ).join('');
}
function selectCategory(c){ activeCategory = c; renderChips(); loadProducts(); }

/* ---------- Catalog ---------- */
function money(n){ return Math.round(n).toLocaleString('uz-UZ') + " so'm"; }

/* ---------- Variant guruhlash ----------
   Bir xil nomdagi mahsulotlar (masalan "Klassik futbolka" L/Qora,
   "Klassik futbolka" M/Oq) katalogda BITTA kartochka sifatida ko'rsatiladi,
   ichida esa o'lcham/rang tanlash tugmalari chiqadi — real do'kon savdo
   ilovalaridagi kabi. */
function groupProducts(products){
  const groups = new Map();
  for(const p of products){
    const key = p.name.trim().toLowerCase();
    if(!groups.has(key)){
      groups.set(key, {
        key, name: p.name, image_url: p.image_url, emoji: p.emoji,
        description: p.description, category_id: p.category_id,
        variants: [],
      });
    }
    const g = groups.get(key);
    if(!g.image_url && p.image_url) g.image_url = p.image_url;
    g.variants.push(p);
  }
  return Array.from(groups.values());
}

function groupPriceLabel(group){
  const prices = group.variants.map(v=>v.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  return min === max ? money(min) : `${money(min)}dan`;
}

function groupTotalStock(group){
  return group.variants.reduce((s,v)=>s+v.stock, 0);
}

function renderCatalog(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = PRODUCTS.filter(p => p.name.toLowerCase().includes(q));
  const groups = groupProducts(list);
  document.getElementById('catalogCount').textContent = groups.length + " ta mahsulot";
  const grid = document.getElementById('productGrid');
  grid.innerHTML = groups.map(g => {
    const totalStock = groupTotalStock(g);
    return `
    <div class="card" onclick="openProductGroup('${g.key.replace(/'/g,"\\'")}')">
      <div class="card-img" style="background:${g.image_url ? `url('${g.image_url}') center/cover` : 'linear-gradient(150deg, var(--surface-2), var(--surface))'};">
        ${totalStock === 0 ? '<div class="card-tag" style="color:var(--danger); border-color:var(--danger);">TUGADI</div>' : (totalStock<=3 ? `<div class="card-tag">${totalStock} DONA QOLDI</div>` : '')}
        ${g.image_url ? '' : `<span>${g.emoji}</span>`}
      </div>
      <div class="card-body">
        <div class="card-name">${g.name}</div>
        <div class="card-meta">
          <div class="card-price">${groupPriceLabel(g)}</div>
          <div class="card-add" onclick="event.stopPropagation(); quickAddGroup('${g.key.replace(/'/g,"\\'")}')">+</div>
        </div>
      </div>
    </div>
  `;
  }).join('') || `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">🔎</div>Hech narsa topilmadi</div>`;
}

function quickAddGroup(key){
  const groups = groupProducts(PRODUCTS);
  const g = groups.find(x=>x.key===key);
  if(!g) return;
  if(g.variants.length === 1){
    quickAdd(g.variants[0].id);
  } else {
    openProductGroup(key); // bir nechta variant bor — tanlash uchun oynani ochamiz
  }
}

function quickAdd(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(p.stock===0) return showToast("❌ Mahsulot omborda yo'q");
  cart.push({productId:id, qty:1});
  updateCartCount();
  showToast("✅ Savatga qo'shildi");
  tg?.HapticFeedback?.impactOccurred('light');
}

/* ---------- Product sheet ---------- */
function setSheetMainImage(url, emoji){
  document.getElementById('sheetImg').innerHTML = url
    ? `<img src="${url}" style="width:100%; height:100%; object-fit:cover; border-radius:16px;">`
    : `<span style="font-size:4rem; background:linear-gradient(150deg, var(--surface-2), var(--surface)); width:100%; height:100%; display:flex; align-items:center; justify-content:center; border-radius:16px;">${emoji}</span>`;
}

let currentGroup = null;
let selectedSize = null;
let selectedColor = null;

async function openProductGroup(key){
  const groups = groupProducts(PRODUCTS);
  currentGroup = groups.find(g => g.key === key);
  if(!currentGroup) return;

  qty = 1;
  document.getElementById('qtyVal').textContent = qty;
  document.getElementById('sheetTitle').textContent = currentGroup.name;
  document.getElementById('sheetDesc').textContent = currentGroup.description || "";

  // Standart holatda: birinchi omborda bor variant tanlanadi (yoki umuman birinchisi)
  const firstInStock = currentGroup.variants.find(v=>v.stock>0) || currentGroup.variants[0];
  selectedSize = firstInStock.size;
  selectedColor = firstInStock.color;

  renderVariantPickers();
  updateSheetForSelection();

  document.getElementById('sheetBackdrop').classList.add('show');
  document.getElementById('sheet').classList.add('show');

  // Galereya
  const stripEl = document.getElementById('sheetGalleryStrip');
  stripEl.innerHTML = '';
  try{
    const extraImages = await apiGet(`/api/products/${firstInStock.id}/images`);
    const allImages = [];
    if(currentGroup.image_url) allImages.push(currentGroup.image_url);
    extraImages.forEach(img => allImages.push(img.url));
    if(allImages.length > 1){
      stripEl.innerHTML = allImages.map(url => `
        <img src="${url}" onclick="setSheetMainImage('${url}', '${currentGroup.emoji}')" style="width:56px; height:56px; object-fit:cover; border-radius:10px; border:1px solid var(--line); cursor:pointer; flex:none;">
      `).join('');
    }
  } catch(e){ console.error(e); }
}

function renderVariantPickers(){
  const sizes = [...new Set(currentGroup.variants.map(v=>v.size).filter(Boolean))];
  const colors = [...new Set(currentGroup.variants.map(v=>v.color).filter(Boolean))];
  const wrap = document.getElementById('variantTags');

  let html = '';
  if(sizes.length > 0){
    html += `<div style="width:100%; margin-bottom:8px;">
      <div style="font-size:.72rem; color:var(--muted); margin-bottom:6px;">O'LCHAM</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${sizes.map(s => {
          const variantExists = currentGroup.variants.some(v=>v.size===s && v.color===selectedColor && v.stock>0)
            || currentGroup.variants.some(v=>v.size===s && v.stock>0);
          return `<div class="pill ${s===selectedSize?'selected':''}" style="${variantExists?'':'opacity:.35;'}" onclick="pickSize('${s.replace(/'/g,"\\'")}')">${s}</div>`;
        }).join('')}
      </div>
    </div>`;
  }
  if(colors.length > 0){
    html += `<div style="width:100%;">
      <div style="font-size:.72rem; color:var(--muted); margin-bottom:6px;">RANG</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${colors.map(c => `<div class="pill ${c===selectedColor?'selected':''}" onclick="pickColor('${c.replace(/'/g,"\\'")}')">${c}</div>`).join('')}
      </div>
    </div>`;
  }
  wrap.innerHTML = html || '<span style="color:var(--muted); font-size:.85rem;">—</span>';
}

function pickSize(size){ selectedSize = size; renderVariantPickers(); updateSheetForSelection(); }
function pickColor(color){ selectedColor = color; renderVariantPickers(); updateSheetForSelection(); }

function getSelectedVariant(){
  // Aynan tanlangan o'lcham+rangga mos variantni topamiz. Agar aniq mos kelmasa
  // (masalan rang shu o'lchamda mavjud emas), eng yaqinini olamiz.
  let variant = currentGroup.variants.find(v => v.size===selectedSize && v.color===selectedColor);
  if(!variant) variant = currentGroup.variants.find(v => v.size===selectedSize);
  if(!variant) variant = currentGroup.variants.find(v => v.color===selectedColor);
  if(!variant) variant = currentGroup.variants[0];
  return variant;
}

function updateSheetForSelection(){
  const variant = getSelectedVariant();
  currentProduct = variant; // savat/checkout eski kod bilan mos ishlashi uchun
  setSheetMainImage(variant.image_url || currentGroup.image_url, currentGroup.emoji);
  document.getElementById('sheetPrice').textContent = money(variant.price);

  const btn = document.getElementById('addToCartBtn');
  if(variant.stock === 0){ btn.disabled = true; btn.textContent = "Omborda yo'q"; }
  else { btn.disabled = false; btn.textContent = `Savatga qo'shish — ${variant.stock} dona bor`; }
}

function closeSheet(){
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}
function changeQty(d){ qty = Math.max(1, qty+d); document.getElementById('qtyVal').textContent = qty; }

function addToCart(){
  const variant = getSelectedVariant();
  if(variant.stock === 0) return showToast("❌ Bu variant omborda yo'q");
  cart.push({productId:variant.id, qty});
  updateCartCount();
  closeSheet();
  showToast("✅ Savatga qo'shildi");
  tg?.HapticFeedback?.impactOccurred('medium');
}

/* ---------- Cart ---------- */
function updateCartCount(){
  document.getElementById('cartCount').textContent = cart.reduce((s,i)=>s+i.qty,0);
}

function renderCart(){
  const list = document.getElementById('cartList');
  const summary = document.getElementById('cartSummary');
  if(cart.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="icon">🛍️</div>Savat bo'sh<br><span style="font-size:.8rem;">Katalogdan mahsulot qo'shing</span></div>`;
    summary.innerHTML = '';
    return;
  }
  list.innerHTML = cart.map((item, idx) => {
    const p = PRODUCTS.find(x=>x.id===item.productId);
    const opts = [p.size, p.color].filter(Boolean).join(' · ');
    return `
    <div class="cart-item">
      <div class="cart-thumb" style="${p.image_url ? `background:url('${p.image_url}') center/cover;` : ''}">${p.image_url ? '' : p.emoji}</div>
      <div class="cart-info">
        <div class="cart-name">${p.name}</div>
        <div class="cart-opts">${opts}</div>
        <div class="cart-row-bottom">
          <div class="cart-qty">
            <button onclick="changeCartQty(${idx},-1)">−</button>
            <span class="mono">${item.qty}</span>
            <button onclick="changeCartQty(${idx},1)">+</button>
          </div>
          <div class="cart-price">${money(p.price*item.qty)}</div>
        </div>
        <div class="remove-btn" onclick="removeFromCart(${idx})">O'chirish</div>
      </div>
    </div>`;
  }).join('');

  const subtotal = cart.reduce((s,i)=> s + PRODUCTS.find(p=>p.id===i.productId).price * i.qty, 0);
  const delivery = subtotal > 300000 ? 0 : 25000;
  summary.innerHTML = `
    <div class="summary-box">
      <div class="summary-line"><span>Mahsulotlar summasi</span><span class="mono">${money(subtotal)}</span></div>
      <div class="summary-line"><span>Yetkazib berish</span><span class="mono">${delivery===0?"Bepul":money(delivery)}</span></div>
      <div class="summary-total"><span>Jami</span><span class="val">${money(subtotal+delivery)}</span></div>
    </div>
    <button class="btn-primary" style="margin-top:16px;" onclick="checkout()">Buyurtma berish</button>
  `;
}
function changeCartQty(idx,d){ cart[idx].qty = Math.max(1, cart[idx].qty+d); updateCartCount(); renderCart(); }
function removeFromCart(idx){ cart.splice(idx,1); updateCartCount(); renderCart(); }

/* ---------- Checkout ---------- */
async function checkout(){
  const btn = document.querySelector('#cartSummary .btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = "Yuborilmoqda..."; }

  const total = cart.reduce((s,i)=> s + PRODUCTS.find(p=>p.id===i.productId).price * i.qty, 0);

  try{
    const payload = {
      telegram_id: myTelegramId,
      full_name: myFullName,
      items: cart.map(i => ({product_id: i.productId, quantity: i.qty})),
    };
    const result = await apiPost('/api/orders', payload);
    const orderId = result.order_ids[0];

    document.getElementById('confirmOrderInfo').textContent = `Buyurtma #${orderId} — ${money(total)}. Tez orada operator siz bilan bog'lanadi.`;
    document.getElementById('confirmOverlay').classList.add('show');
    tg?.HapticFeedback?.notificationOccurred('success');
    cart = [];
    updateCartCount();
    await loadProducts(); // qoldiqlar yangilandi, katalogni qayta yuklaymiz
  } catch(e){
    console.error(e);
    showToast("❌ " + (e.message || "Buyurtma yuborilmadi"));
    if(btn){ btn.disabled = false; btn.textContent = "Buyurtma berish"; }
  }
}
function closeConfirm(){
  document.getElementById('confirmOverlay').classList.remove('show');
  showView('orders');
}

/* ---------- Orders ---------- */
const STATUS_LABEL = {pending:"Kutilmoqda", paid:"To'landi", shipped:"Yo'lda", delivered:"Yetkazildi", cancelled:"Bekor qilindi"};
async function renderOrders(){
  const wrap = document.getElementById('ordersList');
  wrap.innerHTML = `<div class="empty-state" style="padding:30px;">Yuklanmoqda...</div>`;
  try{
    orders = await apiGet('/api/orders/' + myTelegramId);
  } catch(e){
    console.error(e);
    wrap.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Buyurtmalarni yuklab bo'lmadi</div>`;
    return;
  }
  if(orders.length===0){ wrap.innerHTML = `<div class="empty-state"><div class="icon">📋</div>Hali buyurtma yo'q</div>`; return; }
  wrap.innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-top">
        <div class="order-id">#${o.id}</div>
        <div class="order-status status-${o.status}">${STATUS_LABEL[o.status] || o.status}</div>
      </div>
      <div class="order-desc">${o.product_name} × ${o.quantity}</div>
      <div class="order-bottom">
        <span style="color:var(--muted)">${new Date(o.created_at).toLocaleDateString('uz-UZ')}</span>
        <span class="mono" style="font-weight:600;">${money(o.total_price)}</span>
      </div>
    </div>
  `).join('');
}

/* ---------- View switching ---------- */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('nav.bottom button').forEach(b=>b.classList.remove('active'));
  const idx = {catalog:0, ai:1, cart:2, orders:3, profile:4}[name];
  document.querySelectorAll('nav.bottom button')[idx].classList.add('active');
  if(name==='cart') renderCart();
  if(name==='orders') renderOrders();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------- AI Yordamchi (chatbot) ---------- */
let chatHistory = [];

function addChatBubble(role, text){
  const wrap = document.getElementById('chatMessages');
  const isUser = role === 'user';
  const bubble = document.createElement('div');
  bubble.style.cssText = `max-width:85%; padding:10px 14px; border-radius:14px; font-size:.87rem; line-height:1.4; ${isUser ? 'align-self:flex-end; background:var(--teal); color:#092420;' : 'align-self:flex-start; background:var(--surface); border:1px solid var(--line);'}`;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  wrap.scrollTop = wrap.scrollHeight;
  return bubble;
}

function addProductSuggestions(products){
  if(!products || products.length===0) return;
  const wrap = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:8px; overflow-x:auto; align-self:flex-start; max-width:100%;';
  row.innerHTML = products.map(p => `
    <div onclick="closeSheet(); showView('catalog'); setTimeout(()=>openProductGroup('${p.name.trim().toLowerCase().replace(/'/g,"\\'")}'),50)" style="flex:none; width:120px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:8px; cursor:pointer;">
      <div style="height:60px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; background:var(--surface-2); border-radius:8px; margin-bottom:6px;">${emojiFor({category_name: categoryMap[p.category_id]})}</div>
      <div style="font-size:.72rem; font-weight:600; line-height:1.2; margin-bottom:4px;">${p.name}</div>
      <div style="font-size:.72rem; color:var(--teal); font-family:'JetBrains Mono';">${money(p.price)}</div>
    </div>
  `).join('');
  wrap.appendChild(row);
  wrap.scrollTop = wrap.scrollHeight;
}

async function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if(!message) return;
  input.value = '';
  addChatBubble('user', message);
  chatHistory.push({role:'user', content: message});
  const loadingBubble = addChatBubble('assistant', 'Yozmoqda...');

  try{
    const result = await apiPost('/api/ai/chat', {message, history: chatHistory.slice(0,-1)});
    loadingBubble.textContent = result.reply;
    chatHistory.push({role:'assistant', content: result.reply});
    addProductSuggestions(result.products);
  } catch(e){
    console.error(e);
    loadingBubble.textContent = "⚠️ AI xizmati hozircha ishlamayapti. Backend'da ANTHROPIC_API_KEY sozlanganini tekshiring.";
  }
}

/* ---------- Rasm orqali qidiruv ---------- */
function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageSearch(event){
  const file = event.target.files[0];
  if(!file) return;
  showToast("🔍 Rasm tahlil qilinmoqda...");

  try{
    const base64 = await fileToBase64(file);
    const result = await apiPost('/api/ai/image-search', {image_base64: base64, media_type: file.type || 'image/jpeg'});
    const banner = document.getElementById('aiSearchBanner');
    const found = result.products || [];
    banner.innerHTML = `
      <div style="background:var(--surface); border:1px solid var(--teal); border-radius:14px; padding:14px 16px; margin:10px 0 4px; display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <div style="font-size:.85rem;">🤖 <b>${result.analysis?.description || 'Tahlil qilindi'}</b><br><span style="color:var(--muted); font-size:.78rem;">${found.length} ta o'xshash mahsulot topildi</span></div>
        <button onclick="clearImageSearch()" style="background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:6px 12px; color:var(--paper); font-size:.75rem; cursor:pointer; white-space:nowrap;">Bekor qilish</button>
      </div>`;
    if(found.length > 0){
      PRODUCTS = found.map(p => ({...p, category_name: categoryMap[p.category_id] || "", emoji: emojiFor({category_name: categoryMap[p.category_id]})}));
      renderCatalog();
    } else {
      showToast("😕 O'xshash mahsulot topilmadi");
    }
  } catch(e){
    console.error(e);
    showToast("⚠️ Rasm tahlil qilinmadi. AI sozlanganini tekshiring.");
  }
  event.target.value = '';
}

function clearImageSearch(){
  document.getElementById('aiSearchBanner').innerHTML = '';
  loadProducts();
}

/* ---------- Init ---------- */
(async function init(){
  // Faqat haqiqiy Telegram foydalanuvchisi bo'lsa (test/fallback ID emas),
  // uni darhol ro'yxatga olamiz — shunda admin panelda buyurtma bermagan
  // tashrifchilar ham "Mijozlar" ro'yxatida ko'rinadi.
  if(tgUser?.id){
    try{
      await apiPost('/api/users', {telegram_id: myTelegramId, full_name: myFullName, username: myUsername, photo_url: myPhotoUrl});
    } catch(e){ console.error("Foydalanuvchini ro'yxatga olishda xato:", e); }
  }
  await loadCategories();
  await loadProducts();
  updateCartCount();
})();
</script>
